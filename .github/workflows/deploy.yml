name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web UI
        working-directory: apps/pobai-web
        env:
          VITE_BASE: /PoE2POBAI/
          # Point to your deployed server (Railway/Render URL).
          # Set this secret in repo Settings → Secrets → Actions.
          VITE_POBAI_API_URL: ${{ secrets.POBAI_API_URL }}
        run: npm run build

      - name: Deploy docs/ to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
